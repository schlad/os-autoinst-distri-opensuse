---
name: IPSec
description:    >
    Schedule multimachine setup for ipsec tests
vars:
  DESKTOP: textmode
  BOOT_HDD_IMAGE: 1
conditional_schedule:
  bootmenu:
    ARCH:
      aarch64:
  change_kernel:
    CHANGE_KERNEL:
      1:
        - kernel/change_kernel
  boot_after_change_kernel:
    CHANGE_KERNEL:
      1:
        - boot/boot_to_desktop
  copyfail_authencesn:
    COPYFAIL_REPRO:
      1:
        - ipsec/copyfail_authencesn
  dirtyfrag_xfrm_esp:
    DIRTYFRAG_REPRO:
      1:
        - ipsec/dirtyfrag_xfrm_esp
schedule:
  - '{{bootmenu}}'
  - boot/boot_to_desktop
  - '{{change_kernel}}'
  - '{{boot_after_change_kernel}}'
  - ipsec/ipsec3hosts
  - '{{copyfail_authencesn}}'
  - '{{dirtyfrag_xfrm_esp}}'
  - ipsec/l2tp3hosts
